version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: plataforma_ventas
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql  # 👈 Volumen persistente añadido
    networks:
      - monitoring

  backend:
    build: ./backend
    ports:
      - "3001:3000"
    depends_on:
      - mysql
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  mysql_data:  # 👈 Declaración del volumen
  grafana_data: